<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Calzado Pro - Inventario</title>
</head>
<body>
      <a href="index.html" class="btn btn-outline-light btn-sm">Regresar</a>
    <nav class="navbar navbar-dark navbar-custom mb-4">
         
        <div class="container">
            <span class="navbar-brand">CALZADO PRO - INVENTARIO               </span>
         
        </div>
    </nav>

    <div class="container">
        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h3>Gestión de Materias Primas</h3>
                <button id="addMaterialBtn" class="btn btn-success">+ Agregar Material</button>
            </div>
            <div class="mb-3">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar material...">
            </div>
            <table id="inventoryTable" class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Stock Actual</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Los datos se cargarán dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
