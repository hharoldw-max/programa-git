<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Calzado Pro - Acceso</title>

</head>
<body >
    <div class="body-login">

    <div class="card login-card shadow-lg p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Sign In</h2>
            <p class="text-muted">Software de Fabricación y Ventas</p>
        </div>

        <form>
            <div class="mb-3">
                <label for="usuario" class="form-label fw-bold">Usuario</label>
                <input type="text" class="form-control form-control-lg" id="usuario" placeholder="harold" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
            </div>

            <div class="d-grid mb-3">
                <a href="dashboard.html" class="btn btn-primary btn-lg shadow-sm">Iniciar Sesión</a>
            </div>

            <div class="text-center">
                <a href="#" class="text-decoration-none small text-secondary">¿Olvidaste tu contraseña?</a>
                <hr class="my-4">
                <p class="mb-0">¿No tienes cuenta? <a href="#" class="text-primary fw-bold text-decoration-none">Regístrate</a></p>
            </div>
        </form>
    </div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
